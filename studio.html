<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StudioCraft — Beat Maker</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:#0A0A0F;
  --card:#10101E;
  --border:#1E1E38;
  --muted:#1A1A2E;
  --muted-fg:#6B7280;
  --fg:#E8EAF0;
  --primary:#00E5FF;
  --accent:#BF00FF;
  --radius:6px;
}

body {
  background: var(--bg);
  color: var(--fg);
  font-family: Montserrat, sans-serif;
}

.app { max-width:900px; margin:auto; padding:20px; }

.card {
  background: var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  margin-bottom:14px;
}

button { cursor:pointer; }

.transport { padding:14px; display:flex; gap:10px; flex-wrap:wrap; }

.btn {
  padding:8px 14px;
  border:none;
  border-radius:6px;
  font-weight:700;
}

.btn-play { background:var(--primary); color:#000; }
.btn-stop { background:#ff3b3b; color:#fff; }
.btn-ghost { background:transparent; border:1px solid var(--border); color:var(--fg); }

.step {
  flex:1;
  height:30px;
  background:var(--muted);
  border:none;
}

.step.on { background:var(--primary); }

.seq-track { display:flex; }

.track-name {
  width:70px;
  padding:8px;
  font-size:12px;
}

.steps-row { display:flex; gap:2px; flex:1; }

.pads-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; padding:14px; }

.pad {
  padding:20px;
  border:1px solid var(--border);
  background:var(--muted);
  color:white;
}

#toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  padding:10px 20px;
  border-radius:8px;
  display:none;
}
</style>
</head>

<body>
<div class="app">

  <div class="card transport">
    <button class="btn btn-play" id="playBtn" onclick="togglePlay()">Play</button>
    <button class="btn btn-ghost" onclick="resetGrid()">Reset</button>
    <button class="btn btn-ghost" onclick="savePattern()">Save</button>

    <input type="range" min="60" max="200" value="120" id="bpm" oninput="updateBpm(this.value)">
    <span id="bpmVal">120</span>
  </div>

  <div class="card" id="sequencer"></div>

  <div class="card">
    <div class="pads-grid" id="pads"></div>
  </div>

</div>

<div id="toast"></div>

<script>
const STEPS = 16;

const TRACKS = [
  {id:"kick", color:"#00E5FF"},
  {id:"snare", color:"#BF00FF"},
  {id:"hihat", color:"#FF6B00"},
  {id:"clap", color:"#FF3366"}
];

let grid = {};
let bpm = 120;
let playing = false;
let step = 0;
let audioCtx;

function initGrid() {
  TRACKS.forEach(t=>{
    grid[t.id] = Array(STEPS).fill(false);
  });
  grid.kick[0]=grid.kick[4]=grid.kick[8]=grid.kick[12]=true;
  grid.snare[4]=grid.snare[12]=true;
  for(let i=0;i<STEPS;i+=2) grid.hihat[i]=true;
}

function ctx() {
  if(!audioCtx) audioCtx = new AudioContext();
  return audioCtx;
}

function noise(dur=0.2){
  const c = ctx();
  const buffer = c.createBuffer(1, c.sampleRate*dur, c.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i=0;i<data.length;i++) data[i]=Math.random()*2-1;
  const src = c.createBufferSource();
  src.buffer = buffer;
  return src;
}

function kick(t){
  const c=ctx();
  const osc=c.createOscillator();
  const g=c.createGain();
  osc.connect(g); g.connect(c.destination);
  osc.frequency.setValueAtTime(150,t);
  osc.frequency.exponentialRampToValueAtTime(0.01,t+0.5);
  osc.start(t); osc.stop(t+0.5);
}

function snare(t){
  const c=ctx();
  const src=noise(0.2);
  const g=c.createGain();
  const f=c.createBiquadFilter();
  f.type="highpass"; f.frequency.value=1000;
  src.connect(f); f.connect(g); g.connect(c.destination);
  g.gain.setValueAtTime(0.8,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
  src.start(t); src.stop(t+0.2);
}

function hihat(t){
  const c=ctx();
  const src=noise(0.05);
  const g=c.createGain();
  const f=c.createBiquadFilter();
  f.type="bandpass"; f.frequency.value=8000;
  src.connect(f); f.connect(g); g.connect(c.destination);
  g.gain.setValueAtTime(0.3,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.05);
  src.start(t); src.stop(t+0.05);
}

function trigger(id,t){
  if(id==="kick") kick(t);
  if(id==="snare") snare(t);
  if(id==="hihat") hihat(t);
}

let nextTime=0;
let schedStep=0;

function scheduler(){
  const c=ctx();
  while(nextTime < c.currentTime+0.1){
    TRACKS.forEach(t=>{
      if(grid[t.id][schedStep]) trigger(t.id,nextTime);
    });

    nextTime += 60/bpm/4;
    schedStep = (schedStep+1)%STEPS;
  }
  setTimeout(scheduler,25);
}

function start(){
  const c=ctx();
  nextTime=c.currentTime;
  schedStep=0;
  scheduler();
}

function togglePlay(){
  playing=!playing;
  document.getElementById("playBtn").textContent = playing?"Stop":"Play";
  if(playing) start();
}

function build(){
  initGrid();

  const seq=document.getElementById("sequencer");
  seq.innerHTML="";

  TRACKS.forEach(t=>{
    const row=document.createElement("div");
    row.className="seq-track";

    const name=document.createElement("div");
    name.className="track-name";
    name.textContent=t.id;

    const steps=document.createElement("div");
    steps.className="steps-row";

    for(let i=0;i<STEPS;i++){
      const b=document.createElement("button");
      b.className="step";
      b.onclick=()=> {
        grid[t.id][i]=!grid[t.id][i];
        b.classList.toggle("on");
        trigger(t.id, ctx().currentTime);
      };
      steps.appendChild(b);
    }

    row.appendChild(name);
    row.appendChild(steps);
    seq.appendChild(row);
  });

  const pads=document.getElementById("pads");
  TRACKS.forEach(t=>{
    const p=document.createElement("button");
    p.className="pad";
    p.textContent=t.id;
    p.onclick=()=>trigger(t.id,ctx().currentTime);
    pads.appendChild(p);
  });
}

function resetGrid(){
  initGrid();
  document.querySelectorAll(".step").forEach(b=>b.classList.remove("on"));
  showToast("Reset!");
}

function savePattern(){
  showToast("Saved!");
}

function updateBpm(v){
  bpm=v;
  document.getElementById("bpmVal").textContent=v;
}

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",1500);
}

build();
</script>

</body>
</html>
