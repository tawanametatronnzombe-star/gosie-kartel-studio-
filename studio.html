<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DAW ENGINE</title>

<style>
body{
margin:0;
font-family:Arial;
background:#050814;
color:white;
}

/* TOP BAR */
header{
padding:14px;
background:#0f172a;
text-align:center;
font-weight:bold;
border-bottom:1px solid #1e2a44;
}

/* CONTROL BAR */
.controls{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:6px;
padding:8px;
background:#0a1020;
}

button{
padding:10px;
background:#2563eb;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

/* MAIN LAYOUT */
.layout{
display:grid;
grid-template-columns:260px 1fr 260px;
height:90vh;
}

/* MOBILE */
@media(max-width:900px){
.layout{
grid-template-columns:1fr;
height:auto;
}
}

/* LEFT */
.patch{
background:#0c1222;
padding:10px;
overflow:auto;
border-right:1px solid #1e2a44;
}

.node{
background:#18233a;
padding:10px;
margin-bottom:10px;
border-radius:8px;
}

/* CENTER */
.center{
padding:10px;
overflow:auto;
}

.track{
background:#0d1224;
padding:10px;
margin-bottom:12px;
border-radius:10px;
border:1px solid #1e2a44;
}

.grid{
display:grid;
grid-template-columns:repeat(8,1fr);
gap:5px;
}

.pad{
aspect-ratio:1;
background:#1a2238;
border-radius:6px;
cursor:pointer;
transition:0.2s;
}

.pad.active{
background:#00ff99;
box-shadow:0 0 10px #00ff99;
}

/* RIGHT */
.panel{
background:#0b1120;
padding:10px;
border-left:1px solid #1e2a44;
}

canvas{
width:100%;
height:120px;
background:#050816;
border-radius:8px;
margin-top:10px;
}
</style>
</head>

<body>

<header>🎛️DAW ENGINE STUDIO</header>

<div class="controls">
<button onclick="init()">INIT AUDIO</button>
<button onclick="addOsc()">OSC</button>
<button onclick="addNoise()">NOISE</button>
<button onclick="toggle()">PLAY</button>
<button onclick="kickTest()">KICK TEST</button>
</div>

<div class="layout">

<!-- LEFT -->
<div class="patch" id="patch">
<h3>🔌 AudioNodes</h3>
</div>

<!-- CENTER -->
<div class="center">

<div class="track">
<h3>🥁 KICK</h3>
<div class="grid" id="kick"></div>
</div>

<div class="track">
<h3>🎧 SNARE</h3>
<div class="grid" id="snare"></div>
</div>

<div class="track">
<h3>🔊 HIHAT</h3>
<div class="grid" id="hat"></div>
</div>

</div>

<!-- RIGHT -->
<div class="panel">
<h3>📊 VISUALIZER</h3>
<canvas id="viz"></canvas>
</div>

</div>

<script>

/* ================= ENGINE SAFETY ================= */
let ctx = null;
let master = null;
let ready = false;

let nodes=[];

let kickGrid=[], snareGrid=[], hatGrid=[];
let step=0;
let playing=false;

/* ================= INIT ================= */
function init(){
if(ctx) return;

ctx = new (window.AudioContext || window.webkitAudioContext)();

master = ctx.createGain();
master.gain.value = 0.6;
master.connect(ctx.destination);

ready = true;

build("kick",kickGrid);
build("snare",snareGrid);
build("hat",hatGrid);

initViz();

alert("🔥 STUDIO READY");
}

/* ================= NODES ================= */
function addOsc(){
if(!ready) return alert("Click INIT first");

let o=ctx.createOscillator();
let g=ctx.createGain();

o.type="sawtooth";
o.frequency.value=220;

o.connect(g);
g.connect(master);

o.start();

createNode("OSC",g);
nodes.push({o,g});
}

function addNoise(){
if(!ready) return alert("Click INIT first");

let b=ctx.createBuffer(1,ctx.sampleRate,ctx.sampleRate);
let d=b.getChannelData(0);

for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;

let n=ctx.createBufferSource();
n.buffer=b;
n.loop=true;

let g=ctx.createGain();
g.gain.value=0.2;

n.connect(g);
g.connect(master);

n.start();

createNode("NOISE",g);
nodes.push({n,g});
}

function createNode(name,gain){
let div=document.createElement("div");
div.className="node";

div.innerHTML=`
<b>${name}</b><br>
<input type="range" min="0" max="1" step="0.01" value="0.5">
`;

div.querySelector("input").oninput=e=>{
gain.gain.value=e.target.value;
};

document.getElementById("patch").appendChild(div);
}

/* ================= GRID ================= */
function build(id,arr){
let c=document.getElementById(id);

for(let i=0;i<8;i++){
let p=document.createElement("div");
p.className="pad";

p.onclick=()=>{
p.classList.toggle("active");
arr[i]=p.classList.contains("active");
};

c.appendChild(p);
arr.push(false);
}
}

/* ================= DRUM ENGINE ================= */
function kick(){
let o=ctx.createOscillator();
let g=ctx.createGain();

o.frequency.setValueAtTime(140,ctx.currentTime);
o.frequency.exponentialRampToValueAtTime(40,ctx.currentTime+0.12);

g.gain.setValueAtTime(1,ctx.currentTime);
g.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.12);

o.connect(g);
g.connect(master);

o.start();
o.stop(ctx.currentTime+0.12);
}

function snare(){
let b=ctx.createBuffer(1,ctx.sampleRate*0.1,ctx.sampleRate);
let d=b.getChannelData(0);

for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*0.8;

let n=ctx.createBufferSource();
n.buffer=b;

let f=ctx.createBiquadFilter();
f.type="highpass";
f.frequency.value=2000;

let g=ctx.createGain();
g.gain.value=0.4;

n.connect(f);
f.connect(g);
g.connect(master);

n.start();
}

function hihat(){
let b=ctx.createBuffer(1,ctx.sampleRate*0.05,ctx.sampleRate);
let d=b.getChannelData(0);

for(let i=0;i<d.length;i++) d[i]=Math.random();

let n=ctx.createBufferSource();
n.buffer=b;

let f=ctx.createBiquadFilter();
f.type="highpass";
f.frequency.value=7000;

let g=ctx.createGain();
g.gain.value=0.2;

n.connect(f);
f.connect(g);
g.connect(master);

n.start();
}

/* ================= LOOP ================= */
function loop(){
if(!ready || !playing) return;

let i=step%8;

if(kickGrid[i]) kick();
if(snareGrid[i]) snare();
if(hatGrid[i]) hihat();

step++;
setTimeout(loop,140);
}

function toggle(){
if(!ready) return alert("Init first");

playing=!playing;
if(playing) loop();
}

function kickTest(){
if(ready) kick();
}

/* ================= VISUALIZER ================= */
let analyser,dataArray;

function initViz(){
analyser=ctx.createAnalyser();
analyser.fftSize=64;

master.connect(analyser);

dataArray=new Uint8Array(analyser.frequencyBinCount);

draw();
}

function draw(){
requestAnimationFrame(draw);

if(!analyser) return;

analyser.getByteFrequencyData(dataArray);

let c=document.getElementById("viz");
if(!c) return;

let x=c.getContext("2d");

x.clearRect(0,0,300,120);

for(let i=0;i<dataArray.length;i++){
let h=dataArray[i]/2;
x.fillStyle="#00ff99";
x.fillRect(i*4,120-h,3,h);
}
}

</script>

</body>
</html>
